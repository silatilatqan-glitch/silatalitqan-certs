@keyframes up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

let history = [];
let knowledgeDocs = [];
let busy = false;
let kbOpen = false;

function getSystem() {
  if (knowledgeDocs.length === 0) return BASE_SYSTEM;
  const kb = knowledgeDocs.map(d =>
    `\n\n## محتوى ملف: ${d.name}\n${d.content.slice(0, 6000)}`
  ).join('');
  return BASE_SYSTEM + '\n\n# قاعدة المعرفة المرفوعة — أجب منها عند الحاجة:' + kb;
}

function toggleKB() {
  kbOpen = !kbOpen;
  document.getElementById('kb-panel').classList.toggle('open', kbOpen);
}

function dragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag'); }
function dragLeave() { document.getElementById('drop-zone').classList.remove('drag'); }
function dropFile(e) { e.preventDefault(); dragLeave(); handleFiles(e.dataTransfer.files); }

async function handleFiles(files) {
  for (const file of files) {
    const item = { name: file.name, size: file.size, content: '', status: 'loading' };
    const idx = knowledgeDocs.push(item) - 1;
    renderFiles();

    try {
      if (file.name.endsWith('.pdf')) {
        item.content = await readPDF(file);
      } else if (file.name.endsWith('.docx') || file.name.endsWith('.doc')) {
        item.content = await readDOCX(file);
      } else {
        item.content = await file.text();
      }
      item.status = 'ok';
    } catch(e) {
      item.content = `[خطأ في قراءة الملف: ${e.message}]`;
      item.status = 'ok';
    }
    renderFiles();
    updateCount();
  }
}

async function readDOCX(file) {
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buf });
  return result.value;
}

async function readPDF(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const typedArray = new Uint8Array(e.target.result);
        if (typeof pdfjsLib !== 'undefined') {
          const pdf = await pdfjsLib.getDocument(typedArray).promise;
          let text = '';
          for (let i = 1; i <= Math.min(pdf.numPages, 30); i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(s => s.str).join(' ') + '\n';
          }
          resolve(text);
        } else {
          resolve('[لقراءة PDF بدقة أكبر، حوّله إلى Word أو TXT أولاً]');
        }
      } catch(err) { resolve('[تعذّر قراءة PDF — جرب تحويله لـ Word]'); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function renderFiles() {
  const list = document.getElementById('files-list');
  list.innerHTML = knowledgeDocs.map((d, i) => `
    <div class="file-item">
      <div class="file-left">
        <span class="file-icon">${fileIcon(d.name)}</span>
        <span>${d.name}</span>
        <span class="file-size">${(d.size/1024).toFixed(1)} KB</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="file-status ${d.status === 'ok' ? 'status-ok' : 'status-loading'}">
          ${d.status === 'ok' ? '✓ جاهز' : '⏳ جاري القراءة'}
        </span>
        <button class="file-del" onclick="removeFile(${i})">✕</button>
      </div>
    </div>`).join('');
}

function removeFile(i) {
  knowledgeDocs.splice(i, 1);
  renderFiles();
  updateCount();
}

function updateCount() {
  document.getElementById('kb-count').textContent = knowledgeDocs.length;
}

function fileIcon(name) {
  if (name.endsWith('.pdf')) return '📕';
  if (name.endsWith('.docx') || name.endsWith('.doc')) return '📘';
  return '📄';
}

function addMsg(role, text, source) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = role === 'bot' ? '🛡️' : '👤';
  const srcBadge = source ? `<div class="src-badge">📎 من ملف: ${source}</div>` : '';
  div.innerHTML = `<div class="av">${av}</div><div class="bubble">${fmt(text)}${srcBadge}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function fmt(t) {
  const lines = t.split('\n');
  let html = '';
  let inList = false;
  for (let line of lines) {
    line = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    if (/^[-•]\s+/.test(line)) {
      const item = line.replace(/^[-•]\s+/, '');
      if (!inList) { html += '<ul style="margin:6px 0;padding-right:18px;padding-left:0">'; inList = true; }
      html += `<li style="text-align:right;direction:rtl;margin-bottom:4px">${item}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (line.trim() === '') { html += '<br>'; }
      else { html += `<p style="margin:2px 0;text-align:right;direction:rtl">${line}</p>`; }
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function showTyping() {
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="av">🛡️</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text || busy) return;
  busy = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('sugs').style.display = 'none';
  inp.value = ''; inp.style.height = 'auto';

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  let usedSource = null;
  if (knowledgeDocs.length > 0) {
    const low = text.toLowerCase();
    usedSource = knowledgeDocs.find(d =>
      d.content.length > 100 &&
      (d.name.includes('دور') || d.name.includes('course') ||
       d.content.slice(0,200).split(' ').some(w => w.length > 3 && low.includes(w.toLowerCase())))
    )?.name;
  }

  try {
    const payload = {
      system: getSystem(),
      messages: history
    };
    const res = await fetch('https://verify.silatalitqan.com/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const errData = await res.text();
      throw new Error('خطأ من الخادم: ' + res.status + ' — ' + errData.slice(0,100));
    }
    const data = await res.json();
    let reply;
    if (data.content && data.content[0] && data.content[0].text) {
      reply = data.content[0].text;
    } else if (data.error) {
      reply = 'خطأ من الخادم: ' + (data.error.message || JSON.stringify(data.error));
    } else {
      reply = 'عذراً، جاء رد غير متوقع. حاول مجدداً.';
    }
    hideTyping();
    addMsg('bot', reply, usedSource);
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    hideTyping();
    const errText = err?.message || 'خطأ غير معروف';
    addMsg('bot', 'عذراً، حدث خطأ: ' + errText + ' — حاول مجدداً.');
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
}

function quickSend(t) {
  document.getElementById('inp').value = t;
  send();
}
function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

window.onload = () => {
  setTimeout(() => {
    addMsg('bot', `مرحباً! أنا مساعد **صلة الإتقان للتدريب** 👋

يمكنك الآن رفع ملفات الكتالوجات والدورات وأي مستندات وسأجيب منها مباشرة.

اضغط **📚 قاعدة المعرفة** لرفع ملفاتك، أو اسألني مباشرة.`);
  }, 300);
};
